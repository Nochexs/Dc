<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Voice & Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Mesh Gradient -->
        <div class="background-mesh"></div>
        
        <main class="glass-panel">
            <!-- Sidebar Navigation -->
            <nav class="side-nav">
                <div class="logo">
                   <i data-lucide="zap" class="logo-icon"></i>
                </div>
                <div class="nav-icons">
                    <button class="nav-btn active" title="Voice Rooms"><i data-lucide="mic"></i></button>
                    <button class="nav-btn" title="Direct Messages"><i data-lucide="message-square"></i></button>
                    <button class="nav-btn" title="Friends"><i data-lucide="users"></i></button>
                    <button class="nav-btn" title="Settings"><i data-lucide="settings"></i></button>
                </div>
                <div class="user-profile-small">
                    <div class="avatar-small shadow-glow">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
                    </div>
                </div>
            </nav>

            <!-- Main Content Area: Voice Room -->
            <section class="voice-room">
                <header class="room-header">
                    <div class="room-info">
                        <h1>General</h1>
                        <span class="status-badge"><span class="dot"></span> 12 Connected</span>
                    </div>
                    <div class="room-actions">
                        <button id="toggle-chat" class="icon-toggle-btn shadow-glow" title="Chat">
                            <i data-lucide="message-circle"></i>
                        </button>
                    </div>
                </header>

                <div class="users-grid">
                    <!-- User Avatar 1 (Active Speaker) -->
                    <div class="user-card active-speaker">
                        <div class="avatar-ring">
                            <div class="sound-wave"></div>
                            <div class="sound-wave"></div>
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emre" alt="Emre" class="avatar-img">
                        </div>
                        <span class="user-name">Emre</span>
                    </div>

                    <!-- User Avatar 2 -->
                    <div class="user-card">
                        <div class="avatar-ring">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alice" alt="Alice" class="avatar-img">
                        </div>
                        <span class="user-name">Alice</span>
                    </div>

                    <!-- User Avatar 3 -->
                    <div class="user-card">
                        <div class="avatar-ring">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bob" alt="Bob" class="avatar-img">
                        </div>
                        <span class="user-name">Bob</span>
                    </div>

                    <!-- User Avatar 4 -->
                    <div class="user-card">
                        <div class="avatar-ring">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" alt="Sarah" class="avatar-img">
                        </div>
                        <span class="user-name">Sarah</span>
                    </div>
                    
                    <!-- More users can be added here -->
                </div>

                <!-- Floating Bottom Controls -->
                <div class="floating-controls shadow-glow">
                    <button class="control-btn" title="Mute"><i data-lucide="mic"></i></button>
                    <button class="control-btn" title="Deafen"><i data-lucide="headphones"></i></button>
                    <button class="control-btn" title="Share Screen"><i data-lucide="monitor"></i></button>
                    <button class="control-btn leave-btn" title="Leave"><i data-lucide="log-out"></i></button>
                </div>
            </section>

            <!-- Sliding Chat Panel (Fly-out) -->
            <aside id="chat-panel" class="chat-panel hidden">
                <div class="chat-header">
                    <h3>Channel Chat</h3>
                    <button id="close-chat" class="close-btn"><i data-lucide="x"></i></button>
                </div>
                
                <div class="chat-messages">
                    <div class="message">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alice" alt="Alice" class="msg-avatar">
                        <div class="msg-content">
                            <span class="msg-user">Alice</span>
                            <p class="msg-text">Hey everyone! How's the game going?</p>
                        </div>
                    </div>
                    <div class="message">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emre" alt="Emre" class="msg-avatar">
                        <div class="msg-content">
                            <span class="msg-user">Emre</span>
                            <p class="msg-text">Cruising through the final boss now!</p>
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="input-wrapper shadow-glow">
                        <input type="text" placeholder="Send a message..." id="message-input">
                        <button class="send-btn"><i data-lucide="send"></i></button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
